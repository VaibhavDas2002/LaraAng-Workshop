<nav class="navbar">
  <div class="container navbar-content">
    <a routerLink="/" class="brand">LaraAng <span class="brand-light">Workspace</span></a>

    <div class="nav-links">
      @if (authService.isAuthenticated$ | async) {
        <a routerLink="/products" routerLinkActive="active" class="nav-link">Products</a>
        <button (click)="logout()" class="btn btn-secondary ml">Logout</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active" class="nav-link">Login</a>
        <a routerLink="/register" class="btn btn-primary ml">Get Started</a>
      }
    </div>
  </div>
</nav>

<main class="container main-content">
  <router-outlet></router-outlet>
</main>
