<div class="auth-wrapper">
  <div class="glass-panel auth-card">
    <h2 class="title gradient-text">Create Account</h2>
    <p class="subtitle">Join us to manage your products effortlessly.</p>

    <div *ngIf="error" class="alert-error">
      {{ error }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" formControlName="name" placeholder="John Doe">
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" formControlName="email" placeholder="john@example.com">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" placeholder="••••••••">
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" formControlName="password_confirmation" placeholder="••••••••">
        <small class="text-danger" *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('password_confirmation')?.touched">Passwords do not match.</small>
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="registerForm.invalid">
        Register
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a routerLink="/login">Log in</a>
    </div>
  </div>
</div>
