<div class="form-page">
  <div class="form-page-header">
    <a routerLink="/products" class="back-link">← Back to Products</a>
    <h1 class="page-title">{{ isEditMode ? 'Edit Product' : 'New Product' }}</h1>
    <p class="page-subtitle">{{ isEditMode ? 'Update the product details below.' : 'Fill in the details to add a new product.' }}</p>
  </div>

  <div class="form-card">
    @if (fetchingProduct) {
      <div class="loading-state">Loading product data...</div>
    }
    @if (error) {
      <div class="alert-error">{{ error }}</div>
    }

    @if (!fetchingProduct) {
      <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
        <div class="form-grid">
          <div class="form-group full">
            <label class="form-label" for="pf-name">Product Name <span class="required">*</span></label>
            <input id="pf-name" type="text" class="form-control" formControlName="name" placeholder="e.g. Wireless Headphones">
          </div>
          <div class="form-group full">
            <label class="form-label" for="pf-desc">Description</label>
            <textarea id="pf-desc" class="form-control" formControlName="description" rows="4" placeholder="Describe your product..."></textarea>
          </div>
          <div class="form-group half">
            <label class="form-label" for="pf-price">Price (USD) <span class="required">*</span></label>
            <div class="input-prefix-wrap">
              <span class="input-prefix">$</span>
              <input id="pf-price" type="number" class="form-control with-prefix" formControlName="price" step="0.01" placeholder="0.00">
            </div>
          </div>
          <div class="form-group half">
            <label class="form-label" for="pf-stock">Stock Quantity <span class="required">*</span></label>
            <input id="pf-stock" type="number" class="form-control" formControlName="stock" placeholder="0">
          </div>
        </div>

        <div class="form-footer">
          <a routerLink="/products" class="btn btn-secondary">Cancel</a>
          <button type="submit" id="pf-submit" class="btn btn-primary" [disabled]="productForm.invalid || loading">
            @if (!loading) { <span>{{ isEditMode ? 'Update Product' : 'Create Product' }}</span> }
            @if (loading)  { <span>Saving...</span> }
          </button>
        </div>
      </form>
    }
  </div>
</div>
