<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔐</div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Log in to manage your inventory.</p>
    </div>

    <div class="alert-error" *ngIf="error">{{ error }}</div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input type="email" class="form-control" formControlName="email"
               placeholder="john@example.com" id="login-email"
               [class.input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <p class="field-error" *ngIf="loginForm.get('email')?.errors?.['required'] && loginForm.get('email')?.touched">
          Email is required.
        </p>
        <p class="field-error" *ngIf="loginForm.get('email')?.errors?.['email'] && loginForm.get('email')?.touched">
          Please enter a valid email address.
        </p>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input type="password" class="form-control" formControlName="password"
               placeholder="••••••••" id="login-password"
               [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        <p class="field-error" *ngIf="loginForm.get('password')?.errors?.['required'] && loginForm.get('password')?.touched">
          Password is required.
        </p>
      </div>

      <button type="submit" id="login-submit" class="btn btn-primary btn-block"
              [disabled]="loginForm.invalid || loading">
        <span *ngIf="!loading">Log In &rarr;</span>
        <span *ngIf="loading">Authenticating...</span>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a routerLink="/register">Create one</a>
    </div>
  </div>
</div>
