<div class="auth-wrapper">
  <div class="glass-panel auth-card">
    <h2 class="title gradient-text">Welcome Back</h2>
    <p class="subtitle">Log in to manage your workspace.</p>

    <div *ngIf="error" class="alert-error">
      {{ error }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" formControlName="email" placeholder="john@example.com">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" placeholder="••••••••">
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid">
        Log In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a routerLink="/register">Sign up</a>
    </div>
  </div>
</div>
