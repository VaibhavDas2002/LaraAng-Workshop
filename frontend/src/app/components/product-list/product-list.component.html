<div class="page-header">
  <div>
    <h1 class="gradient-text">Product Inventory</h1>
    <p class="text-muted">Manage your product catalog efficiently.</p>
  </div>
  <a routerLink="/products/create" class="btn btn-primary">+ Add Product</a>
</div>

<div *ngIf="error" class="alert-error">
  {{ error }}
</div>

<div class="glass-panel datatable-container">
  <div class="toolbar">
    <div class="search-box">
      <input type="text" placeholder="Search products..." class="form-control" (input)="onSearch($event)">
    </div>
  </div>

  <div class="table-responsive">
    <table class="premium-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Description</th>
          <th>Price</th>
          <th>Stock</th>
          <th style="text-align: right">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="loading">
          <td colspan="6" class="empty-state">Loading products...</td>
        </tr>
        <tr *ngIf="!loading && filteredProducts.length === 0">
          <td colspan="6" class="empty-state">No products found.</td>
        </tr>
        <tr *ngFor="let product of filteredProducts">
          <td class="text-muted">#{{ product.id }}</td>
          <td class="font-medium">{{ product.name }}</td>
          <td class="text-muted text-truncate">{{ product.description }}</td>
          <td class="font-medium">${{ product.price }}</td>
          <td>
            <span class="badge" [ngClass]="{'badge-danger': product.stock === 0, 'badge-success': product.stock > 0}">
              {{ product.stock }} in stock
            </span>
          </td>
          <td style="text-align: right">
            <a [routerLink]="['/products/edit', product.id]" class="btn btn-sm btn-secondary">Edit</a>
            <button (click)="deleteProduct(product.id)" class="btn btn-sm btn-danger m-l-sm">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
